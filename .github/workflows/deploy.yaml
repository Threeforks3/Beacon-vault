name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - run: npm ci

      - name: Install Quartz plugins
        run: npx quartz plugin install

      - name: Strip frontmatter from content
        run: |
          find content/ -name '*.md' ! -name 'Home.md' -print0 | xargs -0 sed -i '1{/^---$/{:a;n;/^---$/!ba;N;d}}' || true

      - name: Build Quartz
        run: npx quartz build

      - name: Fix page titles
        run: |
          pip install pyyaml
          python3 fix-titles.py --public-dir public --vault-dir content --suffix " — SAR Compendium" --home-title "SAR Compendium"

      - name: Write root index.html
        run: |
          cat > public/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en-us">
          <head>
          <title>SAR Compendium</title>
          <link rel="canonical" href="./home">
          <meta name="robots" content="noindex">
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./home">
          </head>
          </html>
          HTMLEOF

      - name: Ensure index.html exists
        run: |
          if [ ! -f public/index.html ] && [ -f public/home.html ]; then
            cp public/home.html public/index.html
          fi
          touch public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
